<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Про мене - scullion</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;1,500;1,600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #ACC8A2;
      --bg: #1A2517;
      --text: #f0f0f0;
      --muted: #bbb;
      --border: #2F3A2A;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      background-image: radial-gradient(circle at 50% -20%, #2f3a2a 0%, #1A2517 60%);
    }

    /* NAV */
    .nav-glass {
      background: rgba(26, 37, 23, 0.8);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--border);
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .btn-back {
      color: var(--muted);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 1.5px;
    }

    .btn-lang {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--primary);
      padding: 6px 14px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-lang:hover {
      background: var(--border);
    }

    .container {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px 80px;
    }

    /* Заголовок стриманий */
    .hero-title {
      font-size: 2.2rem;
      font-weight: 800;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 25px;
    }

    .main-content {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #ccc;
    }

    .accent {
      color: var(--primary);
      font-weight: 700;
    }

    /* Елегантна цитата */
    .feature-note {
      margin: 30px 0 20px;
      padding-left: 18px;
      border-left: 2px solid var(--primary);
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.05rem;
      line-height: 1.8;
      color: #ddd;
    }

    /* Фінальний акцент — ОНОВЛЕНО: жирний курсив */
    .quote-final {
      display: block;
      margin-top: 12px;
      font-family: 'Inter', sans-serif;
      font-style: italic;      /* Додано курсив */
      font-weight: 900;       /* Додано потовщення (Black) */
      color: var(--primary);
      letter-spacing: -0.01em;
    }

    .contact-area {
      margin-top: 50px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
      font-size: 0.9rem;
      color: var(--muted);
      font-family: 'Roboto Mono', monospace;
    }
  </style>
</head>

<body>
  <nav class="nav-glass">
    <a href="index.html" class="btn-back" id="nav-back">← Головна</a>
    <button class="btn-lang" onclick="toggleLanguage()" id="lang-toggle">EN</button>
  </nav>

  <div class="container">
    <h1 class="hero-title" id="title">Про мене</h1>
    <div class="main-content" id="main-text"></div>
    <div class="contact-area" id="contact-area"></div>
  </div>

  <script>
    const langData = {
      uk: {
        title: "Про мене",
        back: "← Головна",
        contact: "Нагадування: якщо Ви помітили помилку або маєте ідею для меню — напишіть мені будь-де, де зручно.",
        content: `
          <p><span class="accent">Якщо чесно</span> — не маю жодного поняття, що тут треба писати. Тому ось мудрість з мультика про пацюка:</p>

          <div class="feature-note">
            “Вміння куховарити не для слабаків. Треба бути вигадливим, хоробрим, пробувати і помилятись…<br>
            І не думати, що тобі може стати на заваді твоє походження — слухайся своєї душі.
            <span class="quote-final">
              Готувати може кожен, але досягти висот — лиш сміливці.”
            </span>
          </div>
        `
      },

      en: {
        title: "About",
        back: "← Main",
        contact: "Reminder: if you spot a typo or have a menu idea — message me anywhere that’s convenient.",
        content: `
          <p><span class="accent">If I’m honest</span> — I have absolutely no idea what you're supposed to write here. So here’s a bit of wisdom from a cartoon about a rat:</p>

          <div class="feature-note">
            “Great cooking is not for the faint of heart. You must be imaginative, strong-hearted.<br>
            You must not let anyone define your limits because of where you come from.
            <span class="quote-final">
              Anyone can cook… but only the fearless can be great.”
            </span>
          </div>
        `
      }
    };

    let currentLang = "uk";

    function updateUI() {
      const data = langData[currentLang];
      document.getElementById("title").innerText = data.title;
      document.getElementById("nav-back").innerText = data.back;
      document.getElementById("main-text").innerHTML = data.content;
      document.getElementById("contact-area").innerText = data.contact;
      document.getElementById("lang-toggle").innerText = currentLang === "uk" ? "EN" : "UA";
      document.getElementById("page-title").innerText =
        (currentLang === "uk" ? "Про мене" : "About") + " - scullion";
    }

    function toggleLanguage() {
      currentLang = currentLang === "uk" ? "en" : "uk";
      updateUI();
    }

    // Ініціалізація при завантаженні
    updateUI();
  </script>
</body>
</html>
