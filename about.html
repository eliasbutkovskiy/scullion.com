<script>
  const langData = {
    en: {
      title: "About<br>Me",
      back: "Main",
      supportDesc:
        "This project runs on passion and coffee. If you want to support new recipes, photoshoots, development, or just say thanks — any help matters:",
      contact:
        "Spotted a typo? Got menu ideas, dietary requests, or want to book a dinner? Hit me up:",
      content: `
        <p><span class="accent">If I'm honest</span> — I have absolutely no idea what you're supposed to write here.</p>
        <p>So here’s a bit of wisdom from a cartoon about a rat:</p>

        <div class="feature-note" style="margin: 30px 0;">
          <strong>“Cooking is not for the weak!”</strong> You have to be inventive, brave, try and fail…<br>
          And don’t think your background can stop you — listen to your soul…<br>
          This is true: <span class="accent">anyone can cook</span>, but <span class="accent">only the brave reach the heights</span>.
        </div>

        <p>Anyway — welcome. I cook, plate, and obsess over the details so the food speaks louder than this section ever will.</p>
      `
    },

    uk: {
      title: "Про<br>мене",
      back: "Головна",
      supportDesc:
        "Цей проєкт тримається на ентузіазмі та каві. Якщо хочете підтримати нові рецепти, фотосесії, розвиток або просто подякувати — будь-яка допомога важлива:",
      contact:
        "Помітили помилку? Маєте ідеї меню, побажання по дієті чи хочете забронювати вечерю? Пишіть:",
      content: `
        <p><span class="accent">Якщо чесно</span> — не маю жодного поняття, що тут треба писати.</p>
        <p>Тому ось мудрість з мультика про пацюка:</p>

        <div class="feature-note" style="margin: 30px 0;">
          <strong>«Вміння куховарити не для слабаків!»</strong> Треба бути вигадливим, хоробрим, пробувати і помилятись…<br>
          І не думати, що тобі може стати на заваді твоє походження — слухайся своєї душі…<br>
          Це правда: <span class="accent">готувати може кожен</span>, але <span class="accent">досягти висот — лиш сміливці</span>!
        </div>

        <p>Коротше: я готую, подаю й задовбуюсь над деталями так, щоб їжа сказала більше, ніж ця сторінка.</p>
      `
    }
  };

  let currentLang = "en";

  function updateUI() {
    const data = langData[currentLang];
    document.getElementById("title").innerHTML = data.title;
    document.getElementById("nav-back").innerHTML = `<span>←</span> ${data.back}`;
    document.getElementById("support-desc").innerText = data.supportDesc;
    document.getElementById("main-text").innerHTML = data.content;
    document.getElementById("contact-area").innerHTML =
      data.contact + '<br><a href="mailto:butkowski.illia@gmail.com">butkowski.illia@gmail.com</a>';
    document.getElementById("lang-toggle").innerText = currentLang === "en" ? "UA" : "EN";
    document.getElementById("page-title").innerText =
      (currentLang === "en" ? "About Me" : "Про мене") + " - scullion";
  }

  function toggleLanguage() {
    currentLang = currentLang === "en" ? "uk" : "en";
    updateUI();
  }

  updateUI();
</script>
