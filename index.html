<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scullion</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #1A2517;
            --text: #f0f0f0;
            --muted: #bbb;
            --accent: #ACC8A2;
            --border: #2F3A2A;
            --input-bg: #243022;
            --header-bg: rgba(26, 37, 23, 0.98);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
        }
        
        header { 
            padding: 15px; 
            border-bottom: 1px solid var(--border); 
            position: sticky; 
            top: 0; 
            background: var(--header-bg); 
            z-index: 100; 
            backdrop-filter: blur(10px); 
        }

        .header-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            max-width: 850px; 
            margin: 0 auto 5px; 
            position: relative;
        }

        .site-title { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 1.95rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: -1px;
            flex-grow: 1;
            text-align: center;
        }

        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            flex-wrap: wrap; 
        }
        .btn { 
            background: var(--input-bg); 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 10px 15px; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 0.85rem; 
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn.active, .btn:hover {
            background: var(--accent); 
            color: #1A2517; 
            border-color: var(--accent);
        }

        .passport-btn { 
            border-color: var(--accent); 
            color: var(--accent); 
            background: transparent; 
        }

        .site-slogan { 
            font-size: 0.9rem; 
            color: var(--accent); 
            text-align: center; 
            margin: 5px auto 15px; 
            font-weight: 400; 
            font-style: italic; 
            max-width: 600px; 
            line-height: 1.4; 
        }

        @media (max-width: 600px) {
            .header-top { margin-bottom: 10px; }
            .site-title { font-size: 1.5rem; margin: 0 5px; }
            .btn, .passport-btn { padding: 8px 12px; font-size: 0.8rem; }
            .site-slogan { font-size: 0.8rem; padding: 0 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="site-title">
            scull
            <svg width="36" height="40" viewBox="0 0 36 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 40 L18 23" stroke="#ACC8A2" stroke-width="5.5" stroke-linecap="round"/>
                <ellipse cx="18" cy="16" rx="12" ry="10" fill="#ACC8A2"/>
                <ellipse cx="10.5" cy="12" rx="6.5" ry="5.5" fill="#7FA46F" transform="rotate(-35 10.5 12)"/>
                <ellipse cx="25.5" cy="13.5" rx="6" ry="5" fill="#7FA46F" transform="rotate(40 25.5 13.5)"/>
                <ellipse cx="14" cy="8" rx="4.5" ry="4" fill="#ACC8A2"/>
                <ellipse cx="22" cy="9" rx="4" ry="3.5" fill="#ACC8A2"/>
                <circle cx="16" cy="14" r="1.8" fill="#5E8A5A"/>
                <circle cx="20" cy="15" r="1.2" fill="#5E8A5A"/>
            </svg>
            on
        </div>

        <div class="controls">
            <button class="btn active" id="btn-en" onclick="setLang('en')">EN</button>
            <button class="btn" id="btn-uk" onclick="setLang('uk')">UA</button>
            <a href="about.html" class="btn passport-btn">ABOUT US</a>
        </div>
    </div>

    <div id="slogan" class="site-slogan"></div>
</header>

<script>
    let currentLang = 'en';

    const translations = {
        uk: { slogan: "Від мийки до вашого столу" },
        en: { slogan: "From the scullery to your table" }
    };

    function setLang(lang) {
        currentLang = lang;
        document.getElementById('btn-uk').classList.toggle('active', lang === 'uk');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        document.getElementById('slogan').innerText = translations[lang].slogan;
    }

    window.onload = () => setLang('en');
</script>

</body>
</html>
